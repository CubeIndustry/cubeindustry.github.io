    body {
      background-color: dimgray;
      color: #DCDAC6;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background: linear-gradient(to right, #000000, dimgray);
      position: absolute;
      top: 0;
      left: 0;
      width: calc(100% - 20px);
      height: 70px;
      padding: 10px;
      display: flex;
      align-items: center;
      z-index: 10;
    }

    header img {
      width: 50px;
      height: 50px;
      margin-right: 10px;
      pointer-events: none;

    }

      color: #DCDAC6;
      margin: 0;
      font-size: 24px;
    }

    #nav {
      position: absolute;
      top: 35px;
      left: 0;
      width: calc(100% - 20px);
      height: 35px;
      background: linear-gradient(to right, #000000, dimgray);
      display: flex;
      justify-content: space-between;
      padding: 10px;
      transition: 0.5s ease;
    }

    #nav.open {
      top: 90px;
    }

    #nav a {
      color: #DCDAC6;
      text-decoration: none;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 5px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
      margin: 0 10px 10px;
      text-align: center;
      align-items: center;
      justify-content: center;
    }

    #opener {
      position: absolute;
      top: 90px;
      left: 0;
      width: 50px;
      height: 25px;
      background-color: #000000;
      border-bottom-right-radius: 10px;
      z-index: 15;
      align-items: center;
      justify-content: center;
      display: flex;
      transition: 0.5s ease;
    }

    #opener.open {
      top: 145px;
    }

    main{
      position: absolute;
      top: 170px;
      left: 0;
      padding: 10px;
      width: calc(100% - 20px);
      height: auto;
    }
    #links a, #services a{
      color: #DCDAC6;
      background-color: grey;
      text-decoration: none;
      font-size: 10px;
      border-radius: 5px;
      text-align: center;
      margin-bottom: 10px;
      align-items: center;
      justify-content: center;
      display: flex;
      padding: 15px 20px;
    }
    #links a i, #services a i{

    }

      text-decoration: none;

  <script>
    const nav = document.getElementById('nav');
    const opener = document.getElementById('opener');
    const icon = opener ? opener.querySelector('i') : null;

    function toggleNav() {
      const isOpen = nav.classList.contains('open');

      nav.classList.toggle('open');
      opener.classList.toggle('open');

      if (isOpen) {
        icon.classList.remove('fa-chevron-up');
        icon.classList.add('fa-chevron-down');
      } else {
        icon.classList.remove('fa-chevron-down');
        icon.classList.add('fa-chevron-up');
      }
    }

    opener.addEventListener('click', toggleNav);
  </script>
